version: '3.8'

services:
  new-year-api:
    build: .
    container_name: new_year_counter
    ports:
      - "4200:4200"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s